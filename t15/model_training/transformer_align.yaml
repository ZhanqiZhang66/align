manifest_path: /n/holylfs06/LABS/bsabatini_lab/Lab/shunnnli/speechbci/data/T15/ptDecoder_ctc_both/5train_13val_8test/manifest_5train_13val_8test.pkl

# ---- MDAN domain split (5 source, 5 target, 8 test held out) ----
source_days: [0, 1, 2, 3, 4]
target_days: [5, 6, 7, 8, 9, 10, 11, 12]

# ---- ALIGN MDAN hyperparameters (transformer) ----
truely_mdan: true               # K binary heads, one per source session
rep_layer_idx: 3                # tap transformer block 2 (0-indexed, out of 7)
dann_lambda: 0.8                # ALIGN: λ_DANN = 0.6 for transformer
dann_hidden: 256                # discriminator hidden dim (d_h in ALIGN)
domain_dropout: 0.0             # dropout inside each discriminator head
linear_discriminator: false     # 3-layer MLP (not linear), per ALIGN appendix
dann_lr_multiplier: 0.5         # disc LR = 0.6 × model LR (ALIGN transformer)
dann_weight_decay: 1.0e-5       # discriminator weight decay (ALIGN)
dann_alpha_type: alternative    # sinusoidal schedule (ALIGN Eq. 3)
phase: 24                       # ω = 16 for transformer (ALIGN Table 1)
dann_warmup_steps: 5            # steps before domain loss is applied
dann_alpha_max_steps: null      # null = use num_training_batches
mean_pool_for_discriminator: false  # use all patch timesteps (not pooled)
lambda_tgt: 0.8                 # target loss weight relative to source
dom_loss_type: mean             # combine per-head losses via mean (or max)
dann_dropout_channel_prob: 0.0  # optional channel-step masking (disabled)
mdan_two_step_backward: true    # memory-efficient two-step backward

# ---- Temporal Stretch Augmentation (TSA) — ALIGN Section 3.2 ----
include_original: true
include_stretched_samples: true     # TSA on source data
include_prolonged_samples: false
stretch_range: [1.5, 5.0]           # stretch factor r ~ Uniform(1.5, 5.0)
prolonged_combined_range: [1.5, 5.0]
prolonged_sample_size: null

